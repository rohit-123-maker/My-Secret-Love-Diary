<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>My Secret Love Diary 🔒</title>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/My diary9.css">
  <style>
              * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        :root {
            --primary: #ff4b6e;
            --secondary: #ff8fa3;
            --bg: var(#fff5f7);
            --card: rgba(255,255,255,0.7);
            --text: #000000;
        }

        /* DARK MODE */
        .dark {
            --bg: #121212;
            --card: rgba(0,0,0,0.6);
            --text: red;
        }

        /* 🌈 BACKGROUND */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ff4b6e, #ff8fa3, #ffd6e0, #ffeef2);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradientMove {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }

        /* 🌊 BLOBS */
        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ff8fa3, transparent);
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: blobMove 20s infinite alternate;
        }

        @keyframes blobMove {
            from { transform: translate(-50px, -50px); }
            to { transform: translate(50px, 50px); }
        }

        /* ✨ SPARKLES */
        .sparkle {
            position: fixed;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 2s linear forwards;
        }

        @keyframes sparkleAnim {
            0% {opacity:0; transform: scale(0);}
            50% {opacity:1; transform: scale(1.2);}
            100% {opacity:0; transform: scale(0);}
        }

        /* 💖 EMOJIS */
        .heart {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            z-index: 100;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity:0.7;}
            100% { transform: translateY(-120vh) rotate(360deg); opacity:0;}
        }
        /* 🎨 TOGGLE */
        .exit-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* 🎨 TOGGLE */
        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* 📦 CARD */
        .card {
            background: var(--card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 10;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
        }

        /* Decorative heart elements */
        .container::before {
            content: '❤';
            position: absolute;
            top: -20px;
            right: 20px;
            font-size: 80px;
            color: rgba(255, 75, 110, 0.37);
            z-index: 0;
        }

        /* Decorative heart elements */
        .container-2::before {
            content: '❤';
            position: absolute;
            top: 513px;
            left: 20px;
            font-size: 80px;
            color: rgba(255, 75, 110, 0.37);
            z-index: 0;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .logo h2 {
            font-size: 2rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .logo span {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Color sequence for logo */
        .logo span:nth-child(1) { color: #ff4b6e; }
        .logo span:nth-child(2) { color: #ff8fa3; }
        .logo span:nth-child(3) { color: #ff4b6e; }
        .logo span:nth-child(4) { color: #ff8fa3; }
        .logo span:nth-child(5) { color: #ff4b6e; }
        .logo span:nth-child(6) { color: #ff8fa3; }
        .logo span:nth-child(7) { color: #ff4b6e; }
        .logo span:nth-child(8) { color: #ff8fa3; }
        .logo span:nth-child(9) { color: #ff4b6e; }
        .logo span:nth-child(10) { color: #ff8fa3; }
        .logo span:nth-child(11) { color: #ff4b6e; }
        .logo span:nth-child(12) { color: #ff8fa3; }
        .logo span:nth-child(13) { color: #ff8fa3; }
        .logo span:nth-child(14) { color: #ff4b6e; }
        .logo span:nth-child(15) { color: #ff8fa3; }
        .logo span:nth-child(16) { color: #ff8fa3; }
        .logo span:nth-child(17) { color: #ff4b6e; }
        .logo span:nth-child(18) { color: #ff8fa3; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 20px;
            border: 2px solid #ffe1e6;
            border-radius: 20px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            resize: none;
            outline: none;
            background-color: var(--bg-cream);
            color: #5d4037;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        textarea:focus {
            border-color: var(--primary-love);
            box-shadow: 0 0 15px rgba(255, 75, 110, 0.1);
        }

        /* Link specific */
        .link-btn {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
        }


        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-save {
            background: var(--primary-love);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 75, 110, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 75, 110, 0.4);
            background: #f03e61;
        }

        .btn-view {
            background: var(rgba(123, 118, 118, 0.74));
            color: var(--primary-love);
            border: 2px solid var(--primary-love);
        }

        .btn-view:hover {
            background: #fff0f3;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 20px;
        }

        .success { color: #2ecc71; }
        .error { color: #e74c3c; }

/*  Welcome Modal Styles  */
        .popup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .popup-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            color: #333;
        }

        .popup-btn {
            background: var(--primary);
            position: 50%;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 700;
        }

    
        /* Modal Overlay */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h4 { margin-top: 0; color: var(--primary-love); }

        .modal input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 4px;
        }

        /* Entries List */
        .entries-container {
            margin-top: 30px;
            border-top: 2px dashed #ffe1e6;
            padding-top: 20px;
            display: none;
        }

        .entry-card {
            background: var(--bg-cream);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary-love);
        }

        .entry-date {
            font-size: 0.8rem;
            color: var(--secondary-love);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
            color: var(--secondary-love);
            line-height: 1.6;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .container { padding: 25px; }
            .button-group { flex-direction: column; }
        };
        
        
  </style>
</head>
<body>

<!-- BLOBS -->
<div class="blob" style="top:10%;left:10%"></div>
<div class="blob" style="bottom:10%;right:10%"></div>

<!-- Welcome Popup on Page Load -->
    <div class="popup" id="welcome-modal">
        <div class="popup-content">
            <h1 style="margin-top: 0;">Welcome! 🤗</h1>
            <p>Enjoy your secret collection of your wonderful and beautiful memories in Love Diary.</p>
            <button class="popup-btn" onclick="closePopup('welcome-modal')">Let's Go!</button>
        </div>
    </div>

<!-- THEME -->
<div class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</div>
<!-- Exit -->
<div class="exit-btn"><a class="link-btn" href="chrome://dino/" target="_blank" onclick="return confirmLeave()">✖️</a>
    </div>
<!-- Logo -->
<div class="container">
<div class="container-2">
    <div class="logo">
    <h2 style="border: red; font-family: cursive;"><span>M</span><span>y</span>&nbsp;<span>S</span><span>e</span><span>c</span><span>r</span><span>e</span><span>t</span>&nbsp;<span>L</span><span>o</span><span>v</span><span>e</span>&nbsp;<span>D</span><span>i</span><span>a</span><span>r</span><span>y</span><span>🔒</span>
        </h2>
    </div>

    <textarea id="diaryInput" placeholder="Tell me I love you 💕 today or write your heart's feelings here on my heart..."></textarea>

    <div class="button-group">
        <button class="btn-save" onclick="saveEntry()">Save Entry ✨</button>
        <button class="btn-view" onclick="showPasswordModal()">Show My Memories 📖</button>
    </div>

    <p id="status"></p>

    <div id="entriesDisplay" class="entries-container">
        <h3 style="color: var(--primary-love); display: flex; justify-content: space-between; align-items: center;">
            Old Memories
            <button onclick="closeEntries()" style="font-size: 0.8rem; padding: 5px 10px; background: #eee; color: #666; border-radius: 5px; width: auto; flex: none;">Close</button>
        </h3>
        <div id="entriesList"></div>
    </div>

    <div class="footer-note">
        Everything For You 🥰🤗🥰<br>
        And Anything For You 💞😘💞
    </div>
    <marquee style="border: red; font-family: cursive;">    <div class="logo">
        <h2><span>M</span><span>y</span>&nbsp;<span>S</span><span>e</span><span>c</span><span>r</span><span>e</span><span>t</span>&nbsp;<span>L</span><span>o</span><span>v</span><span>e</span>&nbsp;<span>D</span><span>i</span><span>a</span><span>r</span><span>y</span><span>🔒</span>
        </h2>
    </div></marquee>
</div>
</div>
<!-- Custom Password Modal -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h4>🔒 Secret Access</h4>
        <p style="font-size: 0.85rem; color: #666;">Enter the password of your love to open the diary.</p>
        <input type="password" id="passInput" placeholder="••••••••">
        <div style="display: flex; gap: 10px;">
            <button onclick="closeModal()" style="background: #eee; color: #666; flex: 1;">Cancel</button>
            <button onclick="verifyPassword()" class="btn-save" style="flex: 2; color: black;">Unlock</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'mySecretDiary_v2';
    const MASTER_PASS = "Rohit@123";
    const THEME_KEY = "theme";

/* LOAD THEME BEFORE LOGIN */
(function(){
    const savedTheme = localStorage.getItem(THEME_KEY);
    if(savedTheme === "dark"){
        document.body.classList.add("dark");
    }
})();

/* THEME TOGGLE */
function toggleTheme(){
    document.body.classList.toggle("dark");
    const mode = document.body.classList.contains("dark") ? "dark" : "light";
    localStorage.setItem(THEME_KEY, mode);
}

    function showMessage(msg, type) {
        const status = document.getElementById('status');
        status.innerText = msg;
        status.className = type;
        setTimeout(() => {
            status.innerText = "";
            status.className = "";
        }, 4000);
    }

    function saveEntry() {
        const input = document.getElementById('diaryInput');
        const entry = input.value.trim();

        if (!entry) {
            showMessage("Write something with your love first! 😍", "error");
            return;
        }

        const date = new Date().toLocaleString([], { 
            year: 'numeric', month: 'short', day: 'numeric', 
            hour: '2-digit', minute: '2-digit' 
        });
        
        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        savedData.push({ date, content: entry });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));

        input.value = "";
        showMessage("Your heart's words are safely locked away. 💘📝", "success");
    }

    function showPasswordModal() {
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passInput').focus();
    }

    function closeModal() {
        document.getElementById('passwordModal').style.display = 'none';
        document.getElementById('passInput').value = '';
    }

    function verifyPassword() {
        const pass = document.getElementById('passInput').value;
        if (pass === MASTER_PASS) {
            closeModal();
            renderEntries();
        } else {
            const modalContent = document.querySelector('.modal-content');
            modalContent.style.animation = 'none';
            void modalContent.offsetWidth; // trigger reflow
            modalContent.style.animation = 'slideUp 1.3s ease-out';
            showMessage("Wrong password! Don't force open my heart. 💞", "error");
            document.getElementById('passInput').value = '';
        }
    }

    function renderEntries() {
        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const displayArea = document.getElementById('entriesDisplay');
        const listArea = document.getElementById('entriesList');

        if (savedData.length === 0) {
            showMessage("No memories saved yet. Start writing! 😟", "error");
            return;
        }

        listArea.innerHTML = "";
        [...savedData].reverse().forEach(entry => {
            const card = document.createElement('div');
            card.className = 'entry-card';
            card.innerHTML = `
                <span class="entry-date">${entry.date}</span>
                <p style="margin: 0; line-height: 1.5;">${entry.content}</p>
            `;
            listArea.appendChild(card);
        });

        displayArea.style.display = "block";
        displayArea.scrollIntoView({ behavior: 'smooth' });
        showMessage("Welcome back, Sweetheart! 💋💖", "success");
    }

    function closeEntries() {
        document.getElementById('entriesDisplay').style.display = 'none';
    }

    // Allow "Enter" key for password
    document.getElementById('passInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyPassword();
    });
    
        /* 💖 EMOJIS FLOAT */
    const emojis = ["💖","✨","🌸","🦋","💕","💓", "💘", "🩷"];
    setInterval(()=>{
        let e = document.createElement("div");
        e.className = "heart";
        e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        e.style.left = Math.random()*100 + "vw";
        e.style.fontSize = (15 + Math.random()*25) + "px";
        e.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 10000);
    }, 600);

    /* ✨ SPARKLES */
    setInterval(()=>{
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random()*100 + "vw";
        s.style.top = Math.random()*100 + "vh";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }, 400);

    /* MOUSE TRAIL */
    document.addEventListener("mousemove", e => {
        let t = document.createElement("div");
        t.className = "sparkle";
        t.style.left = e.clientX + "px";
        t.style.top = e.clientY + "px";
        t.style.background = "var(--primary)";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 800);
    });

    /* SUCCESS BURST */
    function burst(){
        for(let i=0; i<30; i++){
            let b = document.createElement("div");
            b.className = "heart";
            b.innerText = "✨";
            b.style.left = "50vw";
            b.style.bottom = "50vh";
            b.style.fontSize = "24px";
            // Random scatter
            const x = (Math.random() - 0.5) * 400;
            const y = (Math.random() - 0.5) * 400;
            b.style.transform = `translate(${x}px, ${y}px)`;
            b.style.animation = "sparkleAnim 1s ease-out forwards";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 1000);
        }
    }
    
 //   Pop-up Close Function 
        function closePopup(id) {
            document.getElementById(id).style.display = 'none';
        }

    function confirmLeave() {
    return confirm("Are you sure you want to leave?");
}
</script>

</body>
</html>
